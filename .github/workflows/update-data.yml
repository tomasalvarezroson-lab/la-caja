name: Actualizar data.json desde Google Sheets

on:
  schedule:
    - cron: '0 9,21 * * *'   # 06:00 y 18:00 hora Argentina (UTC-3)
  workflow_dispatch:           # también se puede disparar a mano desde GitHub

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Descargar CSV del Sheet
        run: curl -fsSL "${{ secrets.SHEET_CSV_URL }}" -o /tmp/registro.csv

      - name: Convertir CSV a data.json
        run: python3 scripts/update_data.py /tmp/registro.csv

      - name: Commit y push si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data.json
          git diff --staged --quiet && echo "Sin cambios, nada que commitear." || (
            git commit -m "data: actualización automática $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          )
